[package]
name = "breez-sdk-liquid-bindings"
edition = "2021"
version.workspace = true

[[bin]]
name = "uniffi-bindgen"
path = "uniffi-bindgen.rs"

[lib]
name = "breez_sdk_liquid_bindings"
crate-type = ["staticlib", "cdylib", "lib"]

[lints]
workspace = true

[dependencies]
anyhow = { workspace = true }
breez-sdk-liquid = { path = "../core" }
log = { workspace = true }
uniffi = { workspace = true, features = [ "bindgen-tests", "cli" ] }
# Bindgen used by KMP, version has to match the one supported by KMP
uniffi_bindgen = "0.28.0"
uniffi_bindgen_kotlin_multiplatform = { git = "https://gitlab.com/trixnity/uniffi-kotlin-multiplatform-bindings", rev = "b84c88b6a6b37eba9ad740e1d3185d1e62e7da40" }
camino = "1.1.1"
thiserror = { workspace = true }
tokio = { version = "1", features = ["rt"] }
once_cell = { workspace = true }

[build-dependencies]
uniffi = { workspace = true, features = [ "build" ] }
glob = "0.3.1"

[features]
uniffi-25 = []
